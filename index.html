<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel de Entrada</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    
    <style>
        /* Forçar o HTML e o Body a ocuparem 100% da altura da tela e remover margens */
        html, body, .carousel, .carousel-inner, .carousel-item {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Fazer com que as imagens cubram todo o espaço estilo 'background-size: cover' */
        .carousel-item img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        /* Ajuste opcional para dar destaque aos botões e links no fundo da imagem */
        .carousel-caption {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            bottom: 20%; /* Sobe um pouco a legenda para não sumir em telas menores */
        }

        .btn-link-custom {
            margin: 5px;
            min-width: 150px;
        }
    </style>
</head>
<body>

<div id="carouselExampleControls" class="carousel slide" data-ride="carousel" data-interval="5000">
  
  <ol class="carousel-indicators">
    <li data-target="#carouselExampleControls" data-slide-to="0" class="active"></li>
    <li data-target="#carouselExampleControls" data-slide-to="1"></li>
  </ol>

  <div class="carousel-inner">
    
    <div class="carousel-item active">
      <img src="imagens/Fundo_Slide1.jpg" alt="Primeiro Slide">
      <div class="carousel-caption d-none d-md-block">
        <h2>O mundo real,</h2>
        <h3 style="color: #E6D443;">Adaptado a si.</h3>
      </div>
    </div>

    <div class="carousel-item">
      <img src="imagens/Fundo_Slide2.jpg" alt="Segundo Slide">
      <div class="carousel-caption d-none d-md-block">
        <h5>Visite os Nossos Canais</h5>
        <p>Clique nos botões abaixo para aceder às nossas hiperligações importantes.</p>
        
        <div class="mt-3">
          <a href="https://www.google.com" target="_blank" class="btn btn-primary btn-link-custom">Google</a>
          <a href="https://www.wikipedia.org" target="_blank" class="btn btn-success btn-link-custom">Wikipédia</a>
          <a href="#" class="btn btn-danger btn-link-custom">Contacto</a>
        </div>

      </div>
    </div>

  </div>

  <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="sr-only">Anterior</span>
  </a>
  <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="sr-only">Próximo</span>
  </a>

</div>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>    

</body>
</html>
