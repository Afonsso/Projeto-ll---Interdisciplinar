<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Palavra-Passe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/accounts.css">
    <script src="../../js/guestGuard.js"></script>
</head>
<body>

<div class="registo-fullscreen d-flex flex-column justify-content-between">
    
    <a href="./login.html" class="btn-fechar">&times;</a>

    <div>
        <h2 class="titulo-formulario" style="line-height: 1.1;">Recuperar<br>Palavra-Passe</h2>
    </div>

    <form action="./codigo-enviado.html" method="GET" class="form-bloco-central">
        
        <p style="font-size: 0.95rem; color: #000; line-height: 1.5; text-align: center; margin-bottom: 30px;">
            Introduz o teu <strong>email</strong> ou nome de utilizador. Vamos enviar-te um código para redefinir a palavra-passe.
        </p>

        <div class="form-group">
            <input type="email" class="form-control input-custom" style="text-align: center;" placeholder="exemplo@email.com" autocomplete="off" required>
        </div>

        <button type="submit" class="btn btn-criar-conta btn-centralizado">Enviar código</button>

    </form>

    <div class="text-center mb-3">
        <a href="./login_account.html" style="color: #000; font-size: 0.95rem; font-weight: 500; text-decoration: underline;">Voltar ao início de sessão</a>
    </div>

</div>

</body>
</html>
