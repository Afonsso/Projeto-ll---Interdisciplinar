<!DOCTYPE html>
<html lang="pt">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Croma - Roupas & Estilo</title>
	<link rel="stylesheet" href="../../css/globals.css">
	<link rel="stylesheet" href="../../css/world.css">
	<script src="../../js/services/colorutils.js"></script>
	<script type="module" src="../../js/init.js"></script>
	<script type="module" src="../../js/controller/worldPageController.js"></script>
	<script src="../../js/guestGuard.js"></script>
    <link rel="stylesheet" href="../../css/mobile.css">
</head>
<body data-world="roupa">

<header>
	<h1>Roupas & Estilo</h1>
	<p>Aprende a combinar cores na moda...</p>
	<button class="btn-reset" type="button">
		<span class="bola-reset">
			<img src="../../imagens/recomeçar.png" alt="Reiniciar">
		</span>
	</button>
</header>

<div class="cenario" style="background-image: url('../../imagens/roupas.png');">
	<button class="ponto p1" data-level="1">
		<img src="../../imagens/start.png" alt="Nível 1">
	</button>
	<button class="ponto p2 bloqueado" data-level="2">
		<img src="../../imagens/pordesbloquear.png" alt="Nível 2">
	</button>
	<button class="ponto p3 bloqueado" data-level="3">
		<img src="../../imagens/pordesbloquear.png" alt="Nível 3">
	</button>
	<button class="ponto p4 bloqueado" data-level="4">
		<img src="../../imagens/pordesbloquear.png" alt="Nível 4">
	</button>
	<button class="ponto p5 bloqueado" data-level="5">
		<img src="../../imagens/pordesbloquear.png" alt="Nível 5">
	</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
	<div class="modal" id="modal">
		<button class="modal-close" type="button">&times;</button>
		<div class="modal-level-badge" id="modal-numero">1</div>
		<h2 id="modal-titulo">Nível 1</h2>
		<p id="modal-descricao">Inicia o teu desafio de cores!</p>
		<div class="modal-stars" id="modal-stars">☆☆☆</div>
		<div id="modal-dynamic-content"></div>
		<button class="btn-jogar" id="modal-btn" type="button">Jogar</button>
	</div>
</div>

</body>
</html>
