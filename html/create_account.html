<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Começar agora!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/create_account.css">
 
</head>
<body>

<div class="registo-fullscreen">
    
    <a href="#" class="btn-fechar">&times;</a>

    <h2 class="titulo-formulario">Começar agora!</h2>

    <form action="./info_daltonismo.html" method="GET">
        <div class="row">
            
            <div class="col-md-6 pr-md-5">
                
                <div class="form-group mb-4">
                    <label for="nome">Qual é o seu nome?</label>
                    <input type="text" id="nome" class="form-control input-custom" autocomplete="off">
                </div>

                <div class="form-group mb-4">
                    <label for="email">Qual é o seu email?</label>
                    <input type="email" id="email" class="form-control input-custom" autocomplete="off">
                </div>

                <div class="form-group mb-4">
                    <label for="idade">Qual a sua idade?</label>
                    <div class="idade-container">
                        <input type="number" id="idade" class="form-control input-custom input-idade" min="0" max="120">
                    </div>
                </div>

            </div>

            <div class="col-md-6 pl-md-5">
                
                <div class="form-group mb-1">
                    <label for="password">Crie uma Palavra-Passe</label>
                    <input type="password" id="password" class="form-control input-custom">
                </div>

                <ul class="validacao-lista">
                    <li><span class="visto-icon">✓</span> Deve conter um caracter especial (por exemplo: !, @, #, $).</li>
                    <li><span class="visto-icon">✓</span> Deve conter um caracter em maiúscula.</li>
                    <li><span class="visto-icon">✓</span> Deve conter um tamanho igual ou superior a 8 caracteres.</li>
                </ul>

                <div class="form-group mb-1">
                    <label for="confirm-password">Confirme a Palavra-passe</label>
                    <input type="password" id="confirm-password" class="form-control input-custom">
                </div>

                <ul class="validacao-lista">
                    <li><span class="visto-icon">✓</span> As palavras-passe coincidem.</li>
                </ul>

            </div>

        </div>

        <div class="row mt-5">
            <div class="col-12 text-right pr-md-5">
                <button type="submit" class="btn btn-criar-conta">Criar conta</button>
            </div>
        </div>

    </form>
</div>

</body>
</html>
