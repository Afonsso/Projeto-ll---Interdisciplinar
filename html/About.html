<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre</title>

    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="about.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

    <div class="container-principal">
        <div class="container-texto">
            <h1>Sobre</h1>
            <p>O daltonismo, também conhecido como discromatopsia ou discromopsia, é uma perturbação da perceção visual caracterizada pela dificuldade ou incapacidade de distinguir todas ou algumas cores. Na maioria dos casos, manifesta-se como dificuldade em diferenciar o verde do vermelho.</p>
        </div>
        
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="../imagens/Fundo_Slide1.jpg" class="d-block w-100" alt="Exemplo de espectro visual do daltonismo">
                </div>
                <div class="carousel-item">
                    <img src="../imagens/Fundo_Slide2.jpg" class="d-block w-100" alt="Segunda imagem sobre daltonismo">
                </div>
                <div class="carousel-item">
                    <img src="../imagens/Fundo_Slide3.jpg" class="d-block w-100" alt="Terceira imagem sobre daltonismo">
                </div>
            </div>
            
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Próximo</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
